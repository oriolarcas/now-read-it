name: Release

on:
  push:
    tags:
      - "v*.*"

permissions:
  contents: write

jobs:
  android-release:
    name: Build Android release
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vx.y, for example v1.2"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;36.0.0"

      - name: Test
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Prepare release asset
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release-unsigned.apk "release/now-read-it-${GITHUB_REF_NAME}-unsigned.apk"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          generate_release_notes: true
