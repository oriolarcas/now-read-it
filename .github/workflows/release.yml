name: Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*"
  pull_request:

permissions:
  contents: write

jobs:
  android-release:
    name: Build Android release
    runs-on: ubuntu-latest

    steps:
      - name: Check release tag
        id: release-tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+$ ]]; then
            echo "is_release_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platforms;android-35" "build-tools;36.0.0"

      - name: Test
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        if: steps.release-tag.outputs.is_release_tag == 'true'
        run: ./gradlew assembleRelease

      - name: Prepare release asset
        if: steps.release-tag.outputs.is_release_tag == 'true'
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release-unsigned.apk "release/now-read-it-${GITHUB_REF_NAME}-unsigned.apk"

      - name: Create GitHub release
        if: steps.release-tag.outputs.is_release_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          generate_release_notes: true
